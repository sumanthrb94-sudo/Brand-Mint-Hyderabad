<!doctype html>
<!--
  Brand Mint — Email Signature
  Paste the <table> block below into Gmail / Outlook / Apple Mail signature settings.
  Tested in Gmail web, Apple Mail 17, Outlook 365 web. All inline styles for compatibility.
-->
<html>
  <body>
    <table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif; color: #0A0E0C; font-size: 14px; line-height: 1.5;">
      <tr>
        <td style="padding-right: 20px; vertical-align: top; border-right: 1px solid rgba(10,14,12,0.10);">
          <!-- Replace with your hosted PNG of brand-mint-monogram.svg, 56x56 -->
          <img src="https://brandmintstudios.in/brand-kit/logo/brand-mint-monogram.svg" alt="Brand Mint" width="56" height="56" style="display: block; border: 0;" />
        </td>
        <td style="padding-left: 20px; vertical-align: top;">
          <div style="font-weight: 600; font-size: 16px; letter-spacing: -0.01em; color: #0A0E0C;">YOUR NAME</div>
          <div style="font-weight: 400; font-size: 13px; color: rgba(10,14,12,0.62); margin-top: 2px;">Role · Brand Mint</div>
          <div style="font-size: 13px; margin-top: 10px;">
            <a href="https://brandmintstudios.in" style="color: #10B981; text-decoration: none; font-weight: 500;">brandmintstudios.in</a>
            <span style="color: rgba(10,14,12,0.30); margin: 0 8px;">·</span>
            <span style="font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; letter-spacing: 0.04em;">+91 00000 00000</span>
          </div>
          <div style="font-size: 12px; color: rgba(10,14,12,0.55); margin-top: 6px;">Studio in HITEC City, Hyderabad · Booking Q3 2026</div>
        </td>
      </tr>
    </table>
  </body>
</html>
