<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 2560" width="1440" height="2560">
      
    <defs>
      <radialGradient id="mintGlow" cx="50%" cy="50%" r="62%">
        <stop offset="0%"   stop-color="#10B981" stop-opacity="0.42"/>
        <stop offset="55%"  stop-color="#047857" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="cremeGlow" cx="50%" cy="40%" r="70%">
        <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#F5F1EA" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="darkBg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#000000"/>
        <stop offset="100%" stop-color="#06090A"/>
      </linearGradient>
      <linearGradient id="paperBg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#F5F1EA"/>
        <stop offset="100%" stop-color="#E9E2D3"/>
      </linearGradient>
      <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"   stop-color="#7CF6C8"/>
        <stop offset="100%" stop-color="#10B981"/>
      </linearGradient>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="14" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
      
    <rect width="1440" height="2560" fill="url(#paperBg)"/>
    <rect width="1440" height="2560" fill="url(#cremeGlow)" opacity="0.5"/>
    <text x="50" y="780" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="900" font-weight="700"
          fill="#10B981" opacity="0.10">&#8220;</text>

    <g font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="500" letter-spacing="-0.015em" fill="#0A0E0C">
      <text x="80" y="900"  font-size="78">They shipped</text>
      <text x="80" y="1010" font-size="78">in <tspan font-style="italic" fill="#10B981">eleven days</tspan></text>
      <text x="80" y="1120" font-size="78">what our last agency</text>
      <text x="80" y="1230" font-size="78">couldn't ship in</text>
      <text x="80" y="1340" font-size="78"><tspan font-style="italic">three months.</tspan></text>
    </g>

    <g transform="translate(80, 1530)">
      <rect width="120" height="120" rx="16" fill="#10B981"/>
      <text x="60" y="86" text-anchor="middle" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="64"
            font-weight="600" fill="#F5F1EA">A</text>
      <text x="160" y="60" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="40" font-weight="600" fill="#0A0E0C">
        Arjun R.
      </text>
      <text x="160" y="106" font-family="Inter, system-ui, sans-serif" font-size="30" fill="#0A0E0C" opacity="0.62">
        Founder, Northwind Labs
      </text>
    </g>
    
    <rect x="0" y="0"          width="1440" height="3" fill="#10B981" opacity="0.85"/>
    <rect x="0" y="2557"     width="1440" height="3" fill="#10B981" opacity="0.85"/>
    <text x="48" y="2530" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" letter-spacing="0.22em"
          fill="#0A0E0C" opacity="0.55">BRAND MINT</text>
    <text x="1392" y="2530" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22"
          letter-spacing="0.18em" fill="#0A0E0C" opacity="0.55">brandmint.studio</text>
    
    
    </svg>