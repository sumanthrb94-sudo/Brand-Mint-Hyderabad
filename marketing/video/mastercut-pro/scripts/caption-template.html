<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{background:transparent}
#c{position:relative;width:720px;height:1280px;overflow:hidden;font-family:'Inter',sans-serif}
.beh{position:absolute;left:50%;transform:translateX(-50%);font-weight:900;letter-spacing:-.045em;
  white-space:nowrap;color:#1ED197;line-height:.9;opacity:0;will-change:opacity,transform;
  text-shadow:0 4px 0 #0f9d70,0 8px 0 #0b8460,0 12px 4px rgba(0,0,0,.20),0 30px 52px rgba(0,0,0,.45)}
#beh1{top:149px;font-size:88px}
#beh2{top:146px;font-size:96px}
#beh3{top:143px;font-size:108px}
.fro{position:absolute;left:50%;transform:translateX(-50%);font-weight:800;letter-spacing:-.02em;
  white-space:nowrap;color:#F6F2EA;text-align:center;line-height:1.04;opacity:0;will-change:opacity,transform;
  text-shadow:0 3px 0 #1c1c1a,0 7px 2px rgba(0,0,0,.32),0 18px 36px rgba(0,0,0,.55)}
#fro1{top:884px;font-size:52px}
#fro2{top:884px;font-size:50px}
#fro3{top:884px;font-size:56px}
.hero{color:#1ED197}
#bug{position:absolute;right:80px;bottom:92px;display:flex;align-items:center;gap:14px;opacity:0;
  will-change:opacity}
#bug .t{font-weight:800;font-size:34px;color:#F4F1EA;letter-spacing:-.01em;line-height:1;
  text-shadow:0 2px 0 #1c1c1a,0 5px 12px rgba(0,0,0,.5)}
#bug .t b{color:#1ED197;font-weight:900}
#bug .m{width:90px;height:90px;border-radius:26%;flex:0 0 auto;
  background:radial-gradient(120% 120% at 50% 30%, #2BE6A6 0%, #15C68C 50%, #0BA876 100%);
  box-shadow:0 8px 20px rgba(0,60,40,.5),inset 0 2px 0 rgba(255,255,255,.22);position:relative}
#bug .m svg{position:absolute;left:50%;top:53%;transform:translate(-50%,-50%);width:62px;height:62px}
body[data-layer="back"] .fro,body[data-layer="back"] #bug{display:none!important}
body[data-layer="front"] .beh{display:none!important}
</style></head>
<body>
<div id="c">
  <div class="beh" id="beh1">you promised</div>
  <div class="beh" id="beh2">fulfillment</div>
  <div class="beh" id="beh3">every single day</div>
  <div class="fro" id="fro1">seen as <span class="hero">fulfillment</span></div>
  <div class="fro" id="fro2">exactly what <span class="hero">they're</span> delivering</div>
  <div class="fro" id="fro3">that's your <span class="hero">promise</span></div>
  <div id="bug">
    <span class="t">Brand <b>Mint</b></span>
    <span class="m"><svg viewBox="0 0 64 64"><path d="M15 47V17l17 15 17-15v30" stroke="#06281c" stroke-width="5.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
  </div>
</div>
<script>
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const ease=t=>1-Math.pow(1-t,3);
function fade(el,t,t0,t1,rise){
  const p=ease(clamp((t-t0)/(t1-t0),0,1));
  el.style.opacity=p;
  if(rise!==undefined) el.style.transform='translateX(-50%) translateY('+((1-p)*rise)+'px)';
}
function render(t){
  fade(beh1,t,2.34,2.80,-18);
  fade(fro1,t,2.55,3.05,14);
  if(t>3.1) { beh1.style.opacity=0; fro1.style.opacity=0; }
  fade(beh2,t,3.17,3.60,-18);
  fade(fro2,t,3.30,3.75,14);
  if(t>3.95) { beh2.style.opacity=0; fro2.style.opacity=0; }
  fade(beh3,t,6.70,7.10,-18);
  fade(fro3,t,6.85,7.20,14);
  bug.style.opacity=ease(clamp((t-0.5)/0.4,0,1));
}
window.beh1=document.getElementById('beh1');window.beh2=document.getElementById('beh2');window.beh3=document.getElementById('beh3');
window.fro1=document.getElementById('fro1');window.fro2=document.getElementById('fro2');window.fro3=document.getElementById('fro3');
window.bug=document.getElementById('bug');
window.setFrame=render; render(0);
</script></body></html>
