<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,500;0,600;0,700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--mint2:#7CF6C8;--mint3:#10B981;--ink:#0A0E0C;--paper:#F5F1EA;--gold:#C9A14A;--bmink:#0B1F1A;--bminkdeep:#06140F;--cream:#F5F1EA;--emerald:#00C897;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{-webkit-font-smoothing:antialiased}
  .frame{position:relative;width:1920px;height:1080px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  /* grain overlay */
  .frame::after{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/></svg>");pointer-events:none;z-index:9;}
  .dark{background:radial-gradient(120% 90% at 50% 30%,#14352D 0%,var(--bmink) 45%,var(--bminkdeep) 100%);}
  .haze{position:absolute;width:1400px;height:700px;left:50%;top:42%;transform:translate(-50%,-50%);background:radial-gradient(closest-side,rgba(0,200,151,.22),transparent 70%);filter:blur(40px);z-index:1;}
  .glow{position:absolute;left:50%;top:42%;width:760px;height:760px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(closest-side,rgba(124,246,200,.45),rgba(16,185,129,.18),transparent 72%);filter:blur(26px);z-index:1;}
  .mark{position:relative;z-index:5;filter:drop-shadow(0 30px 60px rgba(0,0,0,.55)) drop-shadow(0 0 60px rgba(16,185,129,.35));}
  /* specular sweep */
  .sweep{position:absolute;z-index:6;inset:0;background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.10) 48%,rgba(255,255,255,.22) 50%,transparent 60%);mix-blend-mode:screen;pointer-events:none;}
  /* floor reflection */
  .reflect{position:absolute;left:50%;top:calc(42% + 300px);transform:translate(-50%,0) scaleY(-1);opacity:.16;filter:blur(2px);z-index:2;-webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),transparent 70%);mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),transparent 70%);}
  /* particles */
  .p{position:absolute;border-radius:50%;background:var(--mint2);z-index:4;filter:blur(.5px);opacity:.7;box-shadow:0 0 8px rgba(124,246,200,.8);}
  /* energy ring */
  .ring{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(0,200,151,.5);z-index:3;box-shadow:0 0 40px rgba(0,200,151,.25);}
  .label{position:absolute;left:60px;bottom:54px;z-index:10;font-family:"JetBrains Mono";font-size:22px;letter-spacing:.06em;color:rgba(245,241,234,.55);}
  .tc{position:absolute;right:60px;bottom:54px;z-index:10;font-family:"JetBrains Mono";font-size:22px;letter-spacing:.06em;color:rgba(245,241,234,.45);}
  /* end card */
  .cream{background:radial-gradient(120% 100% at 50% 0%,#fff 0%,var(--paper) 60%);}
  .endwrap{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:30px;text-align:center;}
  .url{font-family:"JetBrains Mono";font-size:30px;letter-spacing:.06em;color:var(--ink);}
  .url u{text-decoration-color:var(--mint3);text-underline-offset:6px;}
  .goldrule{width:120px;height:2px;background:var(--gold);}
  .meta{font-family:"JetBrains Mono";font-size:20px;letter-spacing:.08em;color:rgba(10,14,12,.55);}
  .label.dk{color:rgba(10,14,12,.5)} .tc.dk{color:rgba(10,14,12,.4)}
</style>
</head>
<body>

<!-- helper: define the mark once -->
<svg width="0" height="0" style="position:absolute"><defs>
  <linearGradient id="bm" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7CF6C8"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
</defs></svg>

<!-- FRAME 1 — floating hero mark -->
<section class="frame dark" data-f="01">
  <div class="haze"></div><div class="glow"></div>
  <span class="p" style="width:6px;height:6px;left:34%;top:30%"></span>
  <span class="p" style="width:4px;height:4px;left:62%;top:36%"></span>
  <span class="p" style="width:8px;height:8px;left:40%;top:60%;opacity:.5"></span>
  <span class="p" style="width:5px;height:5px;left:58%;top:62%"></span>
  <span class="p" style="width:3px;height:3px;left:48%;top:24%"></span>
  <span class="p" style="width:5px;height:5px;left:68%;top:54%;opacity:.5"></span>
  <svg class="reflect" width="360" height="360" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="url(#bm)"/><path d="M18 44V20l14 12 14-12v24" stroke="#0B1F1A" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <svg class="mark" width="360" height="360" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="url(#bm)"/><path d="M18 44V20l14 12 14-12v24" stroke="#0B1F1A" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <div class="sweep"></div>
  <span class="label">BRAND MINT · LOGO FILM</span><span class="tc">FRAME 01 · floating mark</span>
</section>

<!-- FRAME 2 — macro close-up -->
<section class="frame dark" data-f="02">
  <div class="glow" style="width:1100px;height:1100px;top:50%"></div>
  <svg class="mark" width="900" height="900" viewBox="14 10 40 40" style="filter:drop-shadow(0 0 80px rgba(16,185,129,.5))"><circle cx="32" cy="32" r="32" fill="url(#bm)"/><path d="M18 44V20l14 12 14-12v24" stroke="#0B1F1A" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <div class="sweep" style="background:linear-gradient(125deg,transparent 40%,rgba(255,255,255,.18) 50%,transparent 62%)"></div>
  <span class="label">BRAND MINT · LOGO FILM</span><span class="tc">FRAME 02 · macro / material</span>
</section>

<!-- FRAME 3 — energy pulse -->
<section class="frame dark" data-f="03">
  <div class="haze"></div>
  <div class="ring" style="width:520px;height:520px;opacity:.7"></div>
  <div class="ring" style="width:760px;height:760px;opacity:.4"></div>
  <div class="ring" style="width:1020px;height:1020px;opacity:.2"></div>
  <div class="glow"></div>
  <span class="p" style="width:6px;height:6px;left:30%;top:40%"></span>
  <span class="p" style="width:5px;height:5px;left:70%;top:46%"></span>
  <span class="p" style="width:4px;height:4px;left:44%;top:68%;opacity:.5"></span>
  <svg class="mark" width="320" height="320" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="url(#bm)"/><path d="M18 44V20l14 12 14-12v24" stroke="#0B1F1A" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  <span class="label">BRAND MINT · LOGO FILM</span><span class="tc">FRAME 03 · rim-light pulse</span>
</section>

<!-- FRAME 4 — cream end card -->
<section class="frame cream" data-f="04">
  <div class="endwrap">
    <svg width="160" height="160" viewBox="0 0 64 64" style="filter:drop-shadow(0 18px 40px rgba(16,185,129,.25))"><circle cx="32" cy="32" r="32" fill="url(#bm)"/><path d="M18 44V20l14 12 14-12v24" stroke="#0B1F1A" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <svg width="430" height="54" viewBox="0 0 320 60"><text x="0" y="44" font-family="Plus Jakarta Sans" font-weight="600" font-size="48" letter-spacing="-0.02em" fill="#0A0E0C">Brand Mint</text></svg>
    <div class="goldrule"></div>
    <div class="url"><u>brandmint.studio</u></div>
    <div class="meta">HITEC CITY, HYDERABAD · BOOKING Q3 2026</div>
  </div>
  <span class="label dk">BRAND MINT · LOGO FILM</span><span class="tc dk">FRAME 04 · end card</span>
</section>

</body>
</html>
