<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin · Brand Mint</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/styles.css?v=4" />
  </head>
  <body class="admin">
    <div id="app" class="shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <header class="topbar" id="topbar"></header>
        <section class="view" id="view">
          <div class="view-loading">Loading…</div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <div id="modal-root"></div>

    <script>
      // Auth is disabled. Always start with a fresh long session so the
      // module's gate logic is bypassed regardless of cache state.
      try {
        localStorage.setItem(
          "bm.admin.v1.session",
          String(Date.now() + 365 * 24 * 60 * 60 * 1000)
        );
      } catch (e) {}
    </script>
    <script type="module" src="/admin/app.js?v=4"></script>
  </body>
</html>
