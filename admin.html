<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin · Brand Mint</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/styles.css?v=11" />
  </head>
  <body class="admin">
    <div id="auth-gate" class="auth-gate" hidden>
      <div class="gate-card">
        <div class="gate-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="44" height="44">
            <defs>
              <linearGradient id="adminGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#7CF6C8" />
                <stop offset="100%" stop-color="#10B981" />
              </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="15" fill="url(#adminGrad)" />
            <path d="M9 22V10l7 6 7-6v12" stroke="#0b1f1a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          </svg>
        </div>
        <h1>Brand Mint Admin</h1>
        <p class="gate-sub">Sign in with your admin email + password.</p>

        <form id="gate-form" method="post" action="javascript:void(0)" autocomplete="on">
          <label class="gate-field">
            <input id="gate-email" name="email" type="email" required autocomplete="email" placeholder=" " />
            <span>Email</span>
          </label>
          <label class="gate-field has-eye">
            <input id="gate-password" name="password" type="password" required autocomplete="current-password" placeholder=" " />
            <span>Password</span>
            <button type="button" class="gate-eye" tabindex="-1" aria-label="Toggle password visibility">Show</button>
          </label>
          <button type="submit" class="btn btn-primary gate-submit">
            <span class="btn-label">Sign in</span>
          </button>
          <p class="gate-error" hidden></p>
        </form>

        <p class="gate-foot">
          Restricted area. Only emails in the <code>admins</code> allowlist can enter.
        </p>
        <p class="gate-foot">
          <a href="#" id="gate-force-signout">Stuck? Clear session from this device →</a>
        </p>
      </div>
    </div>

    <div id="app" class="shell" hidden>
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <header class="topbar" id="topbar"></header>
        <section class="view" id="view">
          <div class="view-loading">Loading…</div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <div id="modal-root"></div>

    <script>
      // SECURITY: scrub any email/password that ended up in the URL (e.g.
      // because the form was submitted before the auth module finished
      // loading and fell back to a default GET). Strip ?email/?password
      // from history immediately so they don't survive in browser history,
      // bookmarks, or the Referer header on the next navigation.
      (function () {
        try {
          var u = new URL(window.location.href);
          var leaked = false;
          ["email", "password"].forEach(function (k) {
            if (u.searchParams.has(k)) {
              u.searchParams.delete(k);
              leaked = true;
            }
          });
          if (leaked) {
            window.history.replaceState(
              {},
              document.title,
              u.pathname + (u.searchParams.toString() ? "?" + u.searchParams.toString() : "") + u.hash
            );
          }
        } catch (_) {}
      })();

      // SECURITY: hard-stop form submission BEFORE the auth module attaches
      // its handler. Without this, a fast submit (or a JS-load failure) lets
      // the browser fall back to the default action and append the password
      // to the URL as a query string.
      document.addEventListener(
        "submit",
        function (e) {
          if (e.target && e.target.id === "gate-form") e.preventDefault();
        },
        true
      );

      // Password eye toggle (must work before the module loads).
      document.addEventListener("click", function (e) {
        const eye = e.target.closest(".gate-eye");
        if (!eye) return;
        const input = eye.parentElement.querySelector("input");
        const masked = input.type === "password";
        input.type = masked ? "text" : "password";
        eye.textContent = masked ? "Hide" : "Show";
      });

      // Force-clear session from this device. Works even if the auth module
      // failed to load — wipes every Supabase auth key from storage and reloads.
      document.addEventListener("click", function (e) {
        var link = e.target.closest("#gate-force-signout");
        if (!link) return;
        e.preventDefault();
        try {
          Object.keys(localStorage).forEach(function (k) {
            if (k.indexOf("sb-") === 0 || k.indexOf("supabase") !== -1) {
              localStorage.removeItem(k);
            }
          });
          Object.keys(sessionStorage).forEach(function (k) {
            if (k.indexOf("sb-") === 0 || k.indexOf("supabase") !== -1) {
              sessionStorage.removeItem(k);
            }
          });
        } catch (_) {}
        location.reload();
      });
    </script>
    <script type="module" src="/admin/app.js?v=11"></script>
  </body>
</html>
