<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin · Brand Mint</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/styles.css?v=12" />
  </head>
  <body class="admin">
    <div id="app" class="shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <header class="topbar" id="topbar"></header>
        <section class="view" id="view">
          <div class="view-loading">Loading…</div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <div id="modal-root"></div>

    <script>
      // Admin gate: only an authenticated admin (demo session with role=admin)
      // can load the dashboard. Non-admins are bounced back to the home page
      // with the login modal open.
      (function () {
        function bounce() {
          try { sessionStorage.setItem("bm.openAuthOnHome", "1"); } catch (e) {}
          window.location.replace("/?signin=1");
        }
        try {
          var raw = localStorage.getItem("bm.demo.session");
          if (!raw) return bounce();
          var demo = JSON.parse(raw);
          var live = demo && demo.user &&
            (demo.expires_at || 0) * 1000 > Date.now();
          if (!live) {
            localStorage.removeItem("bm.demo.session");
            return bounce();
          }
          if (demo.user.role !== "admin") return bounce();
          // Bridge to the existing admin module's session key so its internal
          // gate is satisfied for the duration of the demo session.
          localStorage.setItem(
            "bm.admin.v1.session",
            String((demo.expires_at || 0) * 1000)
          );
        } catch (e) { bounce(); }
      })();
    </script>
    <script type="module" src="/admin/app.js?v=12"></script>
  </body>
</html>
