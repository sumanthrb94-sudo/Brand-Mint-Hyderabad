<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin · Brand Mint</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body class="admin">
    <div id="auth-gate" class="auth-gate" hidden>
      <form id="auth-form" class="auth-card" autocomplete="off">
        <div class="auth-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="40" height="40">
            <defs>
              <linearGradient id="alg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#7CF6C8" />
                <stop offset="100%" stop-color="#10B981" />
              </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="15" fill="url(#alg)" />
            <path
              d="M9 22V10l7 6 7-6v12"
              stroke="#0b1f1a"
              stroke-width="2.4"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
        </div>
        <h1>Brand Mint Admin</h1>
        <p class="auth-sub">Senior-only. Enter passcode to continue.</p>
        <label class="field">
          <input
            id="auth-input"
            type="password"
            placeholder=" "
            autocomplete="current-password"
            required
            autofocus
          />
          <span>Passcode</span>
        </label>
        <button class="btn btn-primary" type="submit">Unlock</button>
        <p id="auth-err" class="auth-err" hidden>Wrong passcode. Try again.</p>
        <p class="auth-hint">
          First time? Default passcode is
          <code>brandmint2026</code>. Change it in Settings after first login.
        </p>
      </form>
    </div>

    <div id="app" class="shell" hidden>
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <header class="topbar" id="topbar"></header>
        <section class="view" id="view">
          <div class="view-loading">Loading…</div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <div id="modal-root"></div>

    <script type="module" src="/admin/app.js"></script>
  </body>
</html>
