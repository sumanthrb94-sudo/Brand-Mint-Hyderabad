<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f1a" />
    <meta name="robots" content="noindex" />
    <title>Page not found — Brand Mint</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=auth3" />
    <style>
      .bm-404 {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 80px var(--pad);
      }
      .bm-404-inner {
        max-width: 560px;
        text-align: center;
      }
      .bm-404-kicker {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 18px;
      }
      .bm-404 h1 {
        font-family: var(--display);
        font-weight: 600;
        font-size: clamp(40px, 7vw, 64px);
        line-height: 1.08;
        margin: 0 0 18px;
      }
      .bm-404 p {
        color: var(--ink-2);
        font-size: 17px;
        margin: 0 0 32px;
      }
      .bm-404-actions {
        display: inline-flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .bm-404 a.btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 22px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 15px;
        background: var(--ink);
        color: var(--cream);
        transition: transform 0.2s ease;
      }
      .bm-404 a.btn:hover { transform: translateY(-1px); }
      .bm-404 a.btn--ghost {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="orb orb--1" aria-hidden="true"></div>
    <div class="orb orb--2" aria-hidden="true"></div>

    <main class="bm-404">
      <div class="bm-404-inner">
        <div class="bm-404-kicker">404 · page not found</div>
        <h1>This page took a long lunch.</h1>
        <p>
          The link you followed is either off, retired, or never existed.
          Head back to the studio and we'll get you where you meant to go.
        </p>
        <div class="bm-404-actions">
          <a class="btn" href="/">← Back to home</a>
          <a class="btn btn--ghost" href="/#contact">Talk to us</a>
        </div>
      </div>
    </main>
  </body>
</html>
